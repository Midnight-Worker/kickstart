<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Bootstrap 4 + jQuery Starter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
  >

  <!-- Eigene Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="card shadow">
        <div class="card-body">
          <h1 class="card-title">Bootstrap 4 + jQuery</h1>

          <p id="output" class="lead">
            Bereit.
          </p>

          <button id="btnClick" class="btn btn-primary">
            Klick
          </button>

          <button id="btnReset" class="btn btn-secondary">
            Reset
          </button>

          <hr>

          <div class="alert alert-info mb-0">
            Klassischer Web-Kickstart: HTML, CSS, jQuery, Bootstrap 4.
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- jQuery zuerst -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 4 Bundle inklusive Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Eigene Logik -->
  <script src="main.js"></script>
</body>
</html>
